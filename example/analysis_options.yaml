include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Demo screens use Material patterns that newer Flutter marks deprecated
    # (e.g. Color.withOpacity); keeping examples readable beats churn here.
    deprecated_member_use: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_fields
    - prefer_final_locals
    - sort_child_properties_last
    - use_super_parameters
