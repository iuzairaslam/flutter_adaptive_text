name: flutter_adaptive_text
description: >-
  Picks legible text colors (black, white, or palette) from backgrounds using
  WCAG 2.1 and APCA. AdaptiveText widget, Color extensions, and utilities.
version: 1.0.1

homepage: https://github.com/iuzairaslam/flutter_adaptive_text

repository: https://github.com/iuzairaslam/flutter_adaptive_text
issue_tracker: https://github.com/iuzairaslam/flutter_adaptive_text/issues

# API docs: pub.dev hosts generated docs at
# https://pub.dev/documentation/flutter_adaptive_text/latest/ automatically.

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

topics:
  - text
  - color
  - accessibility
  - wcag
  - contrast
